name: PR Agent
on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  pr_agent:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: qodo-ai/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          config.model: "gpt-4o-mini"
          pr_reviewer.extra_instructions: |
            This is an Ansible playbook repository. Focus on:
            idempotency, FQCN module names, shell/command overuse,
            missing no_log on secret-handling tasks, changed_when
            and failed_when on command tasks, and check-mode safety.
