---
- name: Update DNS configuration
  hosts: all
  vars:
    dns_config_file: /etc/resolv.conf
    dns_servers:
      - 8.8.8.8
      - 8.8.4.4
    search_domains:
      - corp1.com
      - corp2.vn
  tasks:
    - name: Updating DNS configuration file
      ansible.builtin.copy:
        dest: "{{ dns_config_file }}"
        content: |
          # Generated by Ansible
          {% for server in dns_servers %}
          nameserver {{ server }}
          {% endfor %}
          {% for domain in search_domains %}
          search {{ domain }}
          {% endfor %}
        mode: '0644'
