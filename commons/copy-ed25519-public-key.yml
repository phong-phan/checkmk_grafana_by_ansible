- name: Add SSH public key to target hosts
  hosts: all
  vars:
    target_user: ansible
    local_user: ansible
  tasks:
    - name: Copying SSH public key to authorized_keys
      ansible.posix.authorized_key:
        user: "{{ target_user }}"
        state: present
        key: "{{ lookup('file', '/home/{{ local_user }}/.ssh/id_ed25519.pub') }}"