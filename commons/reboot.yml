---
- name: Reboot the target machine playbook
  hosts: all
  tasks:
    - name: Rebooting the target machine
    ansible.builtin.reboot:
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami
      ignore_errors: true
