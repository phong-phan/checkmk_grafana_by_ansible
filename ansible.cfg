[defaults]
remote_user = ansible
host_key_checking = False
gather_timeout = 360
timeout = 360
retries = 10
display_skipped_hosts = false
interpreter_python = /usr/bin/python3.9
stdout_callback = yaml
stderr_callback = yaml
deprecation_warnings = True
pipelining = True

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
