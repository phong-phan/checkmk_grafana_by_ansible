---
- name: Running CheckMK service discovery on newly added hosts
  hosts: all
  vars_files:
    - /home/ansible/variables/vars_file.yml
    - ../../envs/{{ customer_name }}/CM/{{ site }}/playbooks/CMK/site_vars.yml
  tasks:
    - name: Discovering services on hosts
      checkmk.general.discovery:
        server_url: "{{ cmk_url }}"
        site: "{{ cmk_site }}"
        automation_user: "{{ cmk_user }}"
        automation_secret: "{{ cmk_secret }}"
        hosts:
          - "{{ item.key }}"
        state: "fix_all"
      loop: "{{ servers | dict2items }}"
